name: Skill Lint

on:
  pull_request:
    paths:
      - "**/SKILL.md"
      - "skills/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint changed SKILL.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect changed SKILL.md files
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          git diff --name-only --diff-filter=ACM "$base" "${{ github.sha }}" -- '**/SKILL.md' > changed.txt || true
          echo "Changed SKILL.md files:"; cat changed.txt
          echo "count=$(grep -c . changed.txt || true)" >> "$GITHUB_OUTPUT"

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          mapfile -t files < changed.txt
          python .github/scripts/lint_skill.py "${files[@]}"

      - name: Comment results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- skill-lint-report -->';
            let body = marker + '\n';
            try { body += fs.readFileSync('lint-report.md', 'utf8'); }
            catch { body += '## 🤖 Skill lint report\n\nNo report generated.'; }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail if lint found blocking errors
        if: steps.lint.outcome == 'failure'
        run: |
          echo "Skill lint reported blocking errors. See the PR comment."
          exit 1
